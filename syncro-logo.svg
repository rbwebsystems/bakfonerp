<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" aria-label="Syncro">
  <defs>
    <linearGradient id="syncroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0D9488"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#0D9488"/>
    </marker>
  </defs>
  <!-- S / infinity curved arrows -->
  <path d="M 22 72 C 22 42 48 22 78 38" fill="none" stroke="url(#syncroGrad)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowR)"/>
  <path d="M 78 42 C 48 58 22 58 22 72" fill="none" stroke="url(#syncroGrad)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowL)"/>
  <!-- Nodes at tails -->
  <circle cx="22" cy="72" r="5" fill="#fff" opacity="0.95"/>
  <circle cx="78" cy="38" r="5" fill="#fff" opacity="0.95"/>
  <!-- Central network (hexagon + center) -->
  <circle cx="50" cy="55" r="4" fill="#14B8A6"/>
  <circle cx="50" cy="45" r="3" fill="#0D9488"/>
  <circle cx="58" cy="48" r="3" fill="#0D9488"/>
  <circle cx="58" cy="62" r="3" fill="#0D9488"/>
  <circle cx="50" cy="65" r="3" fill="#0D9488"/>
  <circle cx="42" cy="62" r="3" fill="#0D9488"/>
  <circle cx="42" cy="48" r="3" fill="#0D9488"/>
  <line x1="50" y1="55" x2="50" y2="45" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="58" y2="48" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="58" y2="62" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="50" y2="65" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="42" y2="62" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="42" y2="48" stroke="#0D9488" stroke-width="1.5"/>
  <!-- Text -->
  <text x="105" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#0D9488">Syncro</text>
</svg>
